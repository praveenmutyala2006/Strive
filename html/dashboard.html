<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Strive - Dashboard</title>
  <link rel="stylesheet" href="../css/shared.css">
  <link rel="stylesheet" href="../css/dashboard.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&family=Playfair+Display:wght@500;600&display=swap"
    rel="stylesheet">
</head>

<body>
  <div class="sidebar">
    <h2 class="logo">Strive</h2>
    <ul class="nav-links">
      <li class="active">Dashboard</li>
      <li onclick="goTo('analytics.html')">Analytics</li>
      <li onclick="goTo('motivation.html')">Motivation</li>
      <li onclick="goTo('feedback.html')">Feedback</li>
      <li onclick="goTo('faq.html')">FAQ</li>
      <li onclick="goTo('contact.html')">Contact</li>
      <li onclick="goTo('about.html')">About</li>
      <li onclick="resetUserData()" style="color: var(--coral); margin-top: auto; border-top: 1px solid var(--border); padding: 20px 16px; justify-content: center;">Reset All Data</li>
    </ul>
  </div>

  <!-- Main Content -->
  <div class="main">

    <h1 class="strive-page-title">Hello, <span>User!</span></h1>
    <p class="strive-page-subtitle">Let’s make your life productive</p>
<div class="momentum-ring-mini">
    <svg viewBox="0 0 36 36" class="circular-chart">
      <path class="circle-bg"
        d="M18 2.0845
          a 15.9155 15.9155 0 0 1 0 31.831
          a 15.9155 15.9155 0 0 1 0 -31.831"
      />
      <path class="circle" id="momentumPath"
        stroke-dasharray="0, 100"
        d="M18 2.0845
          a 15.9155 15.9155 0 0 1 0 31.831
          a 15.9155 15.9155 0 0 1 0 -31.831"
      />
      <text x="18" y="18" class="percentage" id="momentumVal">0%</text>
    </svg>
</div>

    <div class="strive-card strive-mb-6">
      <h3 class="strive-h2">Add Habit</h3>
      <div style="display: flex; gap: 10px;">
        <input type="text" class="strive-input" id="habitInput" placeholder="Enter habit to Track">
        <button class="strive-btn strive-btn-primary" onclick="addHabit()">Log Habit</button>
      </div>
    </div>

    <div class="strive-card strive-mb-6">
      <h3 class="strive-h2">Your Habits</h3>
      <div id="habitList"></div>
    </div>
    
    <div class="strive-card strive-mb-6">
      <h3 class="strive-h2">Today's Progress</h3>
      <p id="progressText" style="color: var(--beige-lo); font-size: 14px;">0/0 completed</p>

      <div class="progress-bar">
        <div class="progress" id="progressBar"></div>
      </div>
    </div>

    <button class="strive-btn strive-btn-primary" style="width: 100%; padding: 16px; font-size: 16px;"
      onclick="goTo('analytics.html')">
      View Insights →
    </button>

  </div>

  <script src="../js/shared.js"></script>
   <script src="../js/dashboard.js"></script>
  <script>
   
  </script>

</body>

</html>
